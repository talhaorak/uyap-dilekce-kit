name: CI

on:
  push:
    branches:
      - main
      - master
      - "feat/**"
      - "fix/**"
      - "docs/**"
  pull_request:

jobs:
  test:
    name: Bun test and typecheck
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests
        run: bun test

      - name: Run typecheck
        run: bun run typecheck
